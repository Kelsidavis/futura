insmod all_video
insmod efi_gop
insmod efi_uga
insmod vbe
insmod gfxterm

set gfxmode=auto
set gfxpayload=keep

serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial gfxterm

set timeout=3
set default=0

menuentry "Futura OS (skip xhci, L490 cursor-hang test)" {
    echo "Loading Futura OS kernel (xhci skipped to reach desktop)..."
    multiboot2 /boot/futura_kernel.elf fb=1 klog_dump_prev no_xhci=1
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS" {
    echo "Loading Futura OS kernel..."
    multiboot2 /boot/futura_kernel.elf fb=1 input_diag klog_dump_prev
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS (no input diag pause)" {
    echo "Loading Futura OS kernel without input diagnostics..."
    multiboot2 /boot/futura_kernel.elf fb=1
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS (Tests)" {
    echo "Loading Futura OS kernel (test mode)..."
    multiboot2 /boot/futura_kernel.elf fb=1 async-tests=1
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS (text mode, no framebuffer)" {
    echo "Loading Futura OS kernel (text-only)..."
    set gfxpayload=text
    multiboot2 /boot/futura_kernel.elf
    echo "Booting kernel..."
    boot
}
