name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-14 binutils nasm grub-pc-bin xorriso mtools \
            qemu-system-x86 qemu-utils \
            gcc-14-aarch64-linux-gnu binutils-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build x86_64 kernel
        run: make all ENABLE_WAYLAND=0 DRIVERS=qemu

      - name: Run kernel tests
        run: make test ENABLE_WAYLAND=0 DRIVERS=qemu

      - name: Build x86_64 ISO
        run: |
          make iso ENABLE_WAYLAND=0 DRIVERS=qemu
          mv futura.iso futura-x86_64.iso

      - name: Save x86_64 artifacts
        run: |
          mkdir -p release
          cp futura-x86_64.iso release/
          cp build/bin/futura_kernel.elf release/futura-x86_64.elf

      - name: Clean before ARM64 build
        run: make clean

      - name: Build ARM64 kernel
        run: make kernel PLATFORM=arm64 ENABLE_WAYLAND=0 DRIVERS=qemu

      - name: Collect release artifacts
        # The PLATFORM=arm64 build emits build/bin/futura_kernel.{elf,bin}
        # (no architecture subdirectory).  The previous `build/bin/arm64/`
        # path silently no-op'd because of `2>/dev/null || true`, so the
        # release tarball never actually shipped the ARM64 ELF.  Copy the
        # real artifact paths and include the raw .bin too — that's the
        # file QEMU -kernel and m1n1 payload generators consume.
        run: |
          cp build/bin/futura_kernel.elf release/futura-arm64.elf
          cp build/bin/futura_kernel.bin release/futura-arm64.bin
          sha256sum release/* > release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/futura-x86_64.iso
            release/futura-x86_64.elf
            release/futura-arm64.elf
            release/futura-arm64.bin
            release/SHA256SUMS
