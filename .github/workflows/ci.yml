name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-x86_64:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-14 binutils nasm grub-pc-bin xorriso mtools \
            qemu-system-x86 qemu-utils

      - name: Build kernel (x86_64)
        run: make all ENABLE_WAYLAND=0

      - name: Run kernel tests
        run: make test ENABLE_WAYLAND=0

  build-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-14-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build kernel (ARM64)
        run: make kernel PLATFORM=arm64 ENABLE_WAYLAND=0

  security-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in source
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn --include='*.c' --include='*.h' --include='*.S' \
            -E '(password|secret|api_key|private_key)\s*=' \
            --exclude-dir=.git --exclude-dir=build . ; then
            echo "::warning::Potential secrets found in source code"
          fi

      - name: Check for unsafe patterns
        run: |
          echo "Scanning for unsafe C patterns..."
          issues=0
          if grep -rn --include='*.c' '\bgets\s*(' . --exclude-dir=build; then
            echo "::error::Found gets() usage - use fgets() instead"
            issues=$((issues + 1))
          fi
          if [ $issues -gt 0 ]; then
            exit 1
          fi

      - name: Verify no executable stack (x86_64)
        run: |
          echo "Checking for .note.GNU-stack sections..."
          missing=0
          for f in $(find platform/x86_64 -name '*.S' ! -name 'boot.S'); do
            if ! grep -q 'GNU-stack' "$f" 2>/dev/null; then
              echo "::warning::Missing .note.GNU-stack in $f"
              missing=$((missing + 1))
            fi
          done
          echo "Files missing GNU-stack marker: $missing"

      - name: Check for integer overflow patterns
        run: |
          echo "Scanning for common overflow patterns..."
          # Check for unchecked malloc return
          if grep -rn --include='*.c' 'malloc\s*(' . --exclude-dir=build | \
            grep -v 'if\s*(' | grep -v 'NULL' | grep -v '//' | head -5; then
            echo "::warning::Found malloc() calls that may not check for NULL"
          fi
