insmod all_video
insmod efi_gop
insmod efi_uga
insmod vbe
insmod gfxterm

set gfxmode=auto
set gfxpayload=keep

serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial gfxterm

set timeout=3
set default=0

menuentry "Futura OS (L490 cursor-hang debug)" {
    echo "Loading Futura OS kernel (L490-specific workarounds + diagnostics)..."
    # no_xhci=1       : skip USB host enumeration (known to hang on L490)
    # cstate_cap      : Intel-only opt-in cap of C-states at C1
    # f12_warm_reset  : F12 keypress triggers warm reset for klog capture
    # klog_dump_prev  : dump previous-boot klog ring on this boot
    multiboot2 /boot/futura_kernel.elf fb=1 no_xhci=1 cstate_cap f12_warm_reset klog_dump_prev
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS" {
    echo "Loading Futura OS kernel..."
    multiboot2 /boot/futura_kernel.elf fb=1 input_diag klog_dump_prev
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS (no input diag pause)" {
    echo "Loading Futura OS kernel without input diagnostics..."
    multiboot2 /boot/futura_kernel.elf fb=1
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS (Tests)" {
    echo "Loading Futura OS kernel (test mode)..."
    multiboot2 /boot/futura_kernel.elf fb=1 async-tests=1
    echo "Booting kernel..."
    boot
}

menuentry "Futura OS (text mode, no framebuffer)" {
    echo "Loading Futura OS kernel (text-only)..."
    set gfxpayload=text
    multiboot2 /boot/futura_kernel.elf
    echo "Booting kernel..."
    boot
}
