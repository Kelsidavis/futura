name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-x86_64:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-14 binutils nasm grub-pc-bin xorriso mtools \
            qemu-system-x86 qemu-utils

      - name: Build kernel (x86_64)
        run: make all ENABLE_WAYLAND=0

      - name: Run kernel tests
        run: make test ENABLE_WAYLAND=0

  build-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-14-aarch64-linux-gnu binutils-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build kernel (ARM64)
        run: make kernel PLATFORM=arm64 ENABLE_WAYLAND=0

  security-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check for banned functions in kernel code
        run: |
          echo "Scanning kernel code for banned C functions..."
          status=0
          for func in gets sprintf vsprintf; do
            if grep -rn --include='*.c' "\\b${func}\\s*(" kernel/ platform/ \
                --exclude-dir=build | \
                grep -v '^\s*//' | grep -v '^\s*\*' | grep -v '#define'; then
              echo "::error::Found ${func}() usage in kernel code"
              status=1
            fi
          done
          exit $status

      - name: Check for potential secrets
        run: |
          if grep -rn --include='*.c' --include='*.h' \
            -E '(password|secret|api_key|private_key)\s*=\s*"' \
            --exclude-dir=.git --exclude-dir=build . ; then
            echo "::error::Potential hardcoded secrets found"
            exit 1
          fi

      - name: Check for executable stack markers
        run: |
          echo "Checking assembly files for .note.GNU-stack..."
          missing=0
          for f in $(find platform/x86_64 -name '*.S' ! -name 'boot.S'); do
            if ! grep -q 'GNU-stack' "$f" 2>/dev/null; then
              echo "::warning::Missing .note.GNU-stack in $f"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::warning::$missing assembly files missing GNU-stack marker"
          fi

      - name: Check for unchecked allocation returns
        run: |
          echo "Scanning for unchecked fut_malloc returns..."
          python3 -c "
          import glob
          issues = 0
          for f in glob.glob('kernel/**/*.c', recursive=True):
              with open(f) as fh:
                  lines = fh.readlines()
              for i, line in enumerate(lines):
                  if 'fut_malloc(' in line and '=' in line and '//' not in line.split('fut_malloc')[0]:
                      context = ''.join(lines[i:i+4])
                      if 'if' not in context and 'NULL' not in context and '!=' not in context and '!' not in context:
                          print(f'::warning file={f},line={i+1}::Unchecked fut_malloc return')
                          issues += 1
          print(f'Found {issues} unchecked allocation(s)')
          "

      - name: Compiler warning check (x86_64)
        run: |
          sudo apt-get install -y gcc-14 binutils nasm
          make kernel ENABLE_WAYLAND=0 2>&1 | tee build.log
          if grep -c 'warning:' build.log; then
            echo "::warning::Build produced warnings"
          fi
